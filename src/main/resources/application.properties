# 1. ConfiguraÁıes de Conex„o com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/safehealth_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. ConfiguraÁıes do Hibernate (JPA)
