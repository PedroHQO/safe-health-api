version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: safehealth-postgres
    environment:
      POSTGRES_DB: safehealth_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: safehealth-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
